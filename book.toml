[book]
title = "Windrose 日本語攻略まとめ"
description = "Windrose（ウィンドローズ）の日本語攻略まとめ"
authors = ["windrose-jp"]
language = "ja"
src = "."

[build]
build-dir = "book"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
no-section-label = false
site-url = "/"
# 独自ドメイン: https://windrose.gameguidejp.com/
additional-css = ["theme/custom.css"]
additional-js = ["theme/analytics.js", "theme/kofi.js", "theme/pagefind.js", "theme/footer.js"]

[output.html.fold]
enable = true
level = 99
