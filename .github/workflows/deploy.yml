name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          python3 << 'PYEOF'
          import re, subprocess

          # SUMMARY.mdからファイル名→ページ名マッピングを構築
          page_map = {}
          with open('SUMMARY.md', 'r') as f:
              for line in f:
                  m = re.search(r'\[(.+?)\]\((.+?)\)', line)
                  if m:
                      name, path = m.group(1), m.group(2)
                      page_map[path] = name

          # [攻略]プレフィックス付きコミット一覧を取得
          log = subprocess.run(
              ['git', 'log', '--pretty=format:%H|%ad|%s', '--date=short', '-100'],
              capture_output=True, text=True
          ).stdout.strip().split('\n')

          # 自動生成エントリを収集
          auto_entries = []  # (date_str, top_line, full_line)
          for entry in log:
              if not entry:
                  continue
              sha, date, msg = entry.split('|', 2)
              if not msg.startswith('[攻略] '):
                  continue
              msg = msg.replace('[攻略] ', '', 1)
              # メッセージ先頭の日付 (YYYY-MM-DD ) を除去
              msg = re.sub(r'^\d{4}-\d{2}-\d{2}\s+', '', msg)

              # このコミットで変更された.mdファイルを取得
              diff = subprocess.run(
                  ['git', 'diff-tree', '--no-commit-id', '-r', '--name-only', sha],
                  capture_output=True, text=True
              ).stdout.strip().split('\n')
              md_files = [f for f in diff if f.endswith('.md') and f not in ('README.md', 'SUMMARY.md', 'changelog.md')]

              # コンテンツ変更を含まないコミット（設定・テーマ等）はスキップ
              if not md_files:
                  continue

              # ページ名リンクに変換
              links = []
              for f in md_files:
                  name = page_map.get(f, None)
                  if name:
                      html = f.replace('.md', '.html').replace('README.html', 'index.html')
                      links.append(f'[{name}]({html})')

              line = f'- {date}: {msg}'
              full_line = line
              if links:
                  full_line += ' (' + '、'.join(links) + ')'

              auto_entries.append((date, line, full_line))

          # 手動分エントリを収集（FULL_CHANGELOG_END以降の箇条書き行）
          with open('changelog.md', 'r') as f:
              cl_content = f.read()
          manual_section = re.split(r'<!-- FULL_CHANGELOG_END -->', cl_content)[-1]
          manual_entries = []
          for line in manual_section.split('\n'):
              m = re.match(r'^- (\d{4}-\d{2}-\d{2}): (.+)', line)
              if m:
                  manual_entries.append((m.group(1), line, line))

          # 自動分と手動分を日付降順でマージ（自動分優先で重複除去）
          auto_dates = {e[0] for e in auto_entries}
          merged = auto_entries + [e for e in manual_entries if e[0] not in auto_dates]
          merged.sort(key=lambda x: x[0], reverse=True)

          top_text = '\n'.join(e[1] for e in merged[:10])
          full_text = '\n'.join(e[2] for e in merged)

          for fname, tag_start, tag_end, text in [
              ('README.md', 'CHANGELOG_START', 'CHANGELOG_END', top_text),
              ('changelog.md', 'FULL_CHANGELOG_START', 'FULL_CHANGELOG_END', full_text),
          ]:
              with open(fname, 'r') as f:
                  content = f.read()
              content = re.sub(
                  rf'<!-- {tag_start} -->.*?<!-- {tag_end} -->',
                  f'<!-- {tag_start} -->\n' + text + f'\n<!-- {tag_end} -->',
                  content, flags=re.DOTALL)
              with open(fname, 'w') as f:
                  f.write(content)
          PYEOF

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "latest"

      - name: Build
        run: mdbook build

      - name: Post-process HTML (canonical URLs + static footer)
        run: |
          python3 << 'PYEOF'
          import re
          from pathlib import Path

          BOOK_DIR = Path("book")
          CANONICAL_RE = re.compile(r'(<link rel="canonical" href=")([^"]*)(")')
          OG_URL_RE = re.compile(r'(<meta property="og:url" content=")([^"]*)(")')
          HREFLANG_RE = re.compile(r'(<link rel="alternate" hreflang="[^"]*" href=")([^"]*)(")')
          SCHEMA_URL_RE = re.compile(r'("url":\s*")(https://[^"]*\.md)(")')

          FOOTER_HTML = (
              '<footer id="site-footer">'
              '<nav>'
              '<a href="/">トップ</a>'
              '<span class="sep">|</span>'
              '<a href="/about.html">運営者情報</a>'
              '<span class="sep">|</span>'
              '<a href="/privacy.html">プライバシーポリシー</a>'
              '<span class="sep">|</span>'
              '<a href="/contact.html">お問い合わせ</a>'
              '<span class="sep">|</span>'
              '<a href="https://gameguidejp.com/">GameGuide JP</a>'
              '</nav>'
              '<p class="copyright">&copy; 2026 GameGuide JP</p>'
              '</footer>'
          )

          def fix_url(url):
              url = url.replace(chr(92), "/")
              if url.endswith(".md"):
                  url = url[:-3] + ".html"
              url = url.replace("README.html", "index.html")
              return url

          url_changed = 0
          footer_changed = 0
          for f in BOOK_DIR.rglob("*.html"):
              text = f.read_text(encoding="utf-8")
              new_text = CANONICAL_RE.sub(lambda m: m.group(1) + fix_url(m.group(2)) + m.group(3), text)
              new_text = OG_URL_RE.sub(lambda m: m.group(1) + fix_url(m.group(2)) + m.group(3), new_text)
              new_text = HREFLANG_RE.sub(lambda m: m.group(1) + fix_url(m.group(2)) + m.group(3), new_text)
              new_text = SCHEMA_URL_RE.sub(lambda m: m.group(1) + fix_url(m.group(2)) + m.group(3), new_text)
              if new_text != text:
                  url_changed += 1
                  text = new_text
              if 'id="site-footer"' not in text and '</main>' in text:
                  text = text.replace('</main>', FOOTER_HTML + '</main>', 1)
                  footer_changed += 1
              f.write_text(text, encoding="utf-8")
          print(f"Fixed URLs in {url_changed} HTML files")
          print(f"Inserted static footer in {footer_changed} HTML files")
          PYEOF

      - name: Run Pagefind (CJK-aware search index)
        run: npx -y pagefind@latest --site book

      - name: Generate sitemap.xml
        run: |
          SITE_URL="https://windrose.gameguidejp.com"
          echo '<?xml version="1.0" encoding="UTF-8"?>' > book/sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> book/sitemap.xml
          find book -name '*.html' ! -name 'print.html' ! -name '404.html' ! -name 'toc.html' | sort | while read f; do
            path="${f#book/}"
            echo "  <url><loc>${SITE_URL}/${path}</loc></url>" >> book/sitemap.xml
          done
          echo '</urlset>' >> book/sitemap.xml

      - name: Add redirect to 404 page
        run: |
          sed -i 's|</head>|<meta name="robots" content="noindex, nofollow"><meta http-equiv="refresh" content="3;url=/"></head>|' book/404.html
          sed -i 's|<main>|<main><div style="text-align:center;padding:2em;"><p>ページが見つかりませんでした。3秒後にトップページへ移動します。</p><p><a href="/">トップページへ</a></p></div>|' book/404.html

          # 移動済みページの静的リダイレクト生成
          # $1: 出力先パス（book/配下相対）, $2: リダイレクト先パス（先頭/含む絶対パス）, $3: リンクテキスト
          make_redirect() {
            local dst="book/$1"
            local target="$2"
            local label="$3"
            mkdir -p "$(dirname "$dst")"
            printf '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="robots" content="noindex"><meta http-equiv="refresh" content="0;url=%s"><link rel="canonical" href="https://windrose.gameguidejp.com%s"></head><body><a href="%s">%s</a></body></html>' \
              "$target" "$target" "$target" "$label" > "$dst"
          }

          # story/factions.html → /factions.html（「評判」→「名声」改名前のSEO履歴対応）
          make_redirect "story/factions.html" "/factions.html" "勢力・名声"

          # コラム記事の旧URL（jitsuwa-* → 改名後のシンプルなパス）
          make_redirect "column/jitsuwa-tortuga.html"      "/column/tortuga-buyer.html" "トルトゥーガでは何も買えない"
          make_redirect "column/jitsuwa-boss-rematch.html" "/column/boss-rematch.html"  "ボス再戦には報酬がない（と言われている）"
          make_redirect "column/jitsuwa-crew.html"         "/column/crew-on-ship.html"  "Crew（乗組員）は航海に同行しない"

          # 用語集（公開ページ→内部リファレンスに移動。検索流入はトップへ）
          make_redirect "glossary.html" "/" "Windrose 日本語攻略まとめ"

      - name: Copy static files
        run: |
          cp robots.txt book/robots.txt
          cp google*.html book/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
